name: Deploy Private Resources Hub app to S3 and CloudFront

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-3
  S3_BUCKET: private-resources-hub-dev-frontend
  CLOUDFRONT_DISTRIBUTION_ID: ENOAVYZNASEIR

jobs:
  deploy:
    name: Deploy
    environment: production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build environment
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
        run: |
          test -n "$VITE_COGNITO_USER_POOL_ID" || {
            echo "::error::VITE_COGNITO_USER_POOL_ID is not configured"
            exit 1
          }

          test -n "$VITE_COGNITO_CLIENT_ID" || {
            echo "::error::VITE_COGNITO_CLIENT_ID is not configured"
            exit 1
          }

          test -n "$VITE_COGNITO_REGION" || {
            echo "::error::VITE_COGNITO_REGION is not configured"
            exit 1
          }

          test -n "$VITE_API_BASE_URL" || {
            echo "::error::VITE_API_BASE_URL is not configured"
            exit 1
          }

      - name: Build Vite app
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ vars.VITE_COGNITO_REGION }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/private-resources-hub-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist folder to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"