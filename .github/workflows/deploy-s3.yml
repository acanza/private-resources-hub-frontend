name: Deploy Private Resources Hub app to S3 and CloudFront

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-3
  S3_BUCKET: private-resources-hub-dev-frontend
  CLOUDFRONT_DISTRIBUTION_ID: ENOAVYZNASEIR

jobs:
  deploy:
    name: Build and deploy
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Configure AWS credentials via OIDC
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-vite-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist folder to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete

      - name: Invalidate CloudFront cache
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"